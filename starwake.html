// Touch: joystick left, look right
let joyId = null, joyOrigin = null, lookId = null, lastLook = null;
const joyZone = $('joyZone'), lookZone = $('lookZone'), joyBase = $('joyBase'), joyKnob = $('joyKnob');
function setKnob(dx, dy) {
  const max = 42, len = Math.hypot(dx, dy) || 1, cl = Math.min(len, max);
  const nx = dx / len * cl, ny = dy / len * cl;
  joyKnob.style.left = (joyOrigin.x + nx - 24) + 'px';
  joyKnob.style.top  = (joyOrigin.y + ny - 24) + 'px';
  input.strafe = nx / max; input.fwd = -ny / max;
}
joyZone.addEventListener('touchstart', e => {
  const t = e.changedTouches[0]; joyId = t.identifier;
  joyOrigin = { x: t.clientX, y: t.clientY };
  joyBase.style.display = joyKnob.style.display = 'block';
  joyBase.style.left = (t.clientX - 55) + 'px'; joyBase.style.top = (t.clientY - 55) + 'px';
  setKnob(0, 0); e.preventDefault();
}, { passive: false });
addEventListener('touchmove', e => {
  for (const t of e.changedTouches) {
    if (t.identifier === joyId) setKnob(t.clientX - joyOrigin.x, t.clientY - joyOrigin.y);
    if (t.identifier === lookId && lastLook) {
      input.lookX += (t.clientX - lastLook.x) * 0.004;
      input.lookY += (t.clientY - lastLook.y) * 0.004;
      lastLook = { x: t.clientX, y: t.clientY };
    }
  }
}, { passive: true });
addEventListener('touchend', e => {
  for (const t of e.changedTouches) {
    if (t.identifier === joyId) {
      joyId = null; input.fwd = input.strafe = 0;
      joyBase.style.display = joyKnob.style.display = 'none';
    }
    if (t.identifier === lookId) { lookId = null; lastLook = null; }
  }
});
lookZone.addEventListener('touchstart', e => {
  const t = e.changedTouches[0];
  if (lookId === null) { lookId = t.identifier; lastLook = { x: t.clientX, y: t.clientY }; }
}, { passive: true });
$('btnFire').addEventListener('touchstart', e => { input.fire = true; e.preventDefault(); }, { passive: false });
$('btnFire').addEventListener('touchend', () => input.fire = false);
$('btnFire').addEventListener('touchcancel', () => input.fire = false);
$('btnFire').addEventListener('pointerdown', () => input.fire = true);
$('btnFire').addEventListener('pointerup', () => input.fire = false);
$('btnBoost').addEventListener('touchstart', e => { input.boost = true; e.preventDefault(); }, { passive: false });
$('btnBoost').addEventListener('touchend', () => input.boost = false);
$('btnBoost').addEventListener('touchcancel', () => input.boost = false);
$('btnBoost').addEventListener('pointerdown', () => input.boost = true);
$('btnBoost').addEventListener('pointerup', () => input.boost = false);

if ('ontouchstart' in window) document.body.classList.add('touch');

/* ---------------- GAME LOOP ---------------- */
let lastT = 0, saveTimer = 0, lastSector = '', pulseT = 0;
function updateHUD() {
  $('hpFill').style.width = (Math.max(0, G.hp) / G.hpMax * 100) + '%';
  $('shFill').style.width = (Math.max(0, G.shield) / G.shieldMax * 100) + '%';
  $('credits').textContent = G.credits + ' ¤';
  $('lvlText').textContent = 'LV ' + G.level;
  $('xpFill').style.width = (G.xp / xpForLevel(G.level) * 100) + '%';
}
function tick(t) {
  requestAnimationFrame(tick);
  const dt = Math.min((t - lastT) / 1000, 0.1); lastT = t;
  if (!G.running) { renderer && renderer.render(scene, camera); return; }
  G.playtime += dt;

  if (G.mode === 'docked' || G.uiOpen) { renderer.render(scene, camera); return; }
  if (G.mode === 'surface') {
    surfaceTick(dt);
    updateHUD();
    saveTimer += dt;
    if (saveTimer > 30) { saveTimer = 0; SaveMan.save(snapshot(), true); }
    pulseT += dt;
    if (pulseT > 2) { pulseT = 0; checkMain(); }
    renderer.render(scene, camera);
    return;
  }

  // Keyboard merge
  const kf = (keys['KeyW'] ? 1 : 0) - (keys['KeyS'] ? 1 : 0);
  const ks = (keys['KeyD'] ? 1 : 0) - (keys['KeyA'] ? 1 : 0);
  let fwd = joyId !== null ? input.fwd : kf || input.fwd;
  const str = joyId !== null ? input.strafe : ks || input.strafe;
  const boost = input.boost || keys['ShiftLeft'];
  if (boost && Math.abs(fwd) < 0.05 && Math.abs(str) < 0.05) fwd = 1;   // boost alone = full burn

  // Orientation
  G.yaw -= input.lookX; G.pitch -= input.lookY * (opts.invert ? -1 : 1);
  G.pitch = Math.max(-1.35, Math.min(1.35, G.pitch));
  input.lookX = input.lookY = 0;

  // Velocity in facing direction
  const engMul = 1 + 0.13 * (((G.ship || {}).eng || 1) - 1);
  const speed = (boost ? 220 : 90) * engMul;
  const cy = Math.cos(G.yaw), sy = Math.sin(G.yaw), cp = Math.cos(G.pitch), sp = Math.sin(G.pitch);
  const fx = -sy * cp, fy = sp, fz = -cy * cp;          // forward
  const rx = cy, rz = -sy;                               // right
  G.vel.x += (fx * fwd + rx * str) * speed * dt * 2.2;
  G.vel.y += (fy * fwd) * speed * dt * 2.2;
  G.vel.z += (fz * fwd + rz * str) * speed * dt * 2.2;
  const damp = Math.pow(0.35, dt);
  G.vel.x *= damp; G.vel.y *= damp; G.vel.z *= damp;
  G.pos.x += G.vel.x * dt; G.pos.y += G.vel.y * dt; G.pos.z += G.vel.z * dt;

  // Ship + camera: nose always follows steering/view; camera stays behind the ship
  ship.position.set(G.pos.x, G.pos.y, G.pos.z);
  {
    // NOTE: hull is built pointing +Z and yaw-flipped by PI, so local pitch must be negated
    // to match the camera's forward vector (previously inverted: view up tilted the nose down).
    const targetQ = new THREE.Quaternion().setFromEuler(new THREE.Euler(-G.pitch, G.yaw + Math.PI, 0, 'YXZ'));
    ship.quaternion.slerp(targetQ, Math.min(1, dt * 25));   // near-instant, trace of smoothing
  }
  const camDist = 14, camUp = 4.5;
  camera.position.set(
    G.pos.x - fx * camDist, G.pos.y - fy * camDist + camUp, G.pos.z - fz * camDist
  );
  camera.lookAt(G.pos.x + fx * 20, G.pos.y + fy * 20, G.pos.z + fz * 20);

  // engine trail
  const moving = Math.abs(fwd) > 0.1 || Math.abs(str) > 0.1;
  if (moving) {
    const emit = boost ? 3 : 1;
    for (let k = 0; k < emit; k++) {
      const i3 = trailIdx * 3;
      trailPos[i3]     = G.pos.x - fx * (4 + k) + (Math.random() - 0.5) * 1.2;
      trailPos[i3 + 1] = G.pos.y - fy * (4 + k) + (Math.random() - 0.5) * 1.2;
      trailPos[i3 + 2] = G.pos.z - fz * (4 + k) + (Math.random() - 0.5) * 1.2;
      trailIdx = (trailIdx + 1) % TRAIL_N;
    }
    trailPoints.geometry.attributes.position.needsUpdate = true;
  }

  // Recycle stars around player (infinite field illusion)
  const p = starPoints.geometry.attributes.position;
  for (let i = 0; i < p.count; i++) {
    let dx = p.getX(i) - G.pos.x, dy = p.getY(i) - G.pos.y, dz = p.getZ(i) - G.pos.z;
    if (dx > 2500) p.setX(i, p.getX(i) - 5000); else if (dx < -2500) p.setX(i, p.getX(i) + 5000);
    if (dy > 2500) p.setY(i, p.getY(i) - 5000); else if (dy < -2500) p.setY(i, p.getY(i) + 5000);
    if (dz > 2500) p.setZ(i, p.getZ(i) - 5000); else if (dz < -2500) p.setZ(i, p.getZ(i) + 5000);
  }
  p.needsUpdate = true;

  updateSystems();
  checkInteract();
  spaceCombatTick(dt);

  // Sector via hash grid
  const sx = Math.floor(G.pos.x / SECTOR_SIZE), sy2 = Math.floor(G.pos.y / SECTOR_SIZE), sz = Math.floor(G.pos.z / SECTOR_SIZE);
  const sName = sectorName(G.seed, sx, sy2, sz);
  if (sName !== lastSector) {
    lastSector = sName;
    $('sectorName').textContent = sName.toUpperCase();
    toast('Entering ' + sName);
    blip(520, 0.2, 0.05);
  }

  // HUD
  const spd = Math.hypot(G.vel.x, G.vel.y, G.vel.z);
  $('speedInfo').textContent = Math.round(spd) + ' u/s';
  updateHUD();

  // Autosave every 30 s
  saveTimer += dt;
  if (saveTimer > 30) { saveTimer = 0; SaveMan.save(snapshot(), true); }
  pulseT += dt;
  if (pulseT > 2) { pulseT = 0; checkMain(); }

  renderer.render(scene, camera);
}

/* ---------------- BOOT ---------------- */
function goFullscreen() {
  try {
    const el = document.documentElement;
    const fn = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen || el.msRequestFullscreen;
    if (fn && !document.fullscreenElement && !document.webkitFullscreenElement) {
      const p = fn.call(el, { navigationUI: 'hide' });
      if (p && p.catch) p.catch(() => {});
    }
  } catch (e) { /* unsupported (e.g. iPhone Safari) — play windowed */ }
}
async function startGame(fresh) {
  goFullscreen();
  audioInit(); blip(660, 0.25, 0.06);
  if (fresh) {
    G.seed = (Math.random() * 4294967295) >>> 0;
    G.pos = { x: 0, y: 0, z: 0 }; G.credits = 250; G.level = 1; G.xp = 0;
    G.hp = G.hpMax; G.shield = G.shieldMax; G.playtime = 0;
    G.inv = {}; G.weapon = 1; G.found = {}; G.ship = { eng: 1, hull: 1, shld: 1 };
    recalcStats();
    G.quests = []; G.qdone = {}; G.mainStage = 0; G.mainProg = {};
    addItem('medkit', 1);
    await SaveMan.save(snapshot(), true);
  } else {
    const s = await SaveMan.load();
    if (s) restore(s); else { toast('No save found — starting new voyage'); return startGame(true); }
  }
  $('titleScreen').classList.add('hidden');
  $('hud').classList.add('active');
  G.running = true;
  if (G.mode === 'surface' && G.surface) {
    const p = currentPlanet();
    if (p) enterSurface(p); else G.mode = 'space';
  }
  updateQuestTrack();
  Music.setMode(G.mode === 'surface' ? 'surface' : 'space');
  toast(fresh ? 'Voyage begun — seed ' + G.seed.toString(16).toUpperCase() : 'Voyage resumed');
  if (fresh) {
    setTimeout(() => tut('move', document.body.classList.contains('touch')
      ? 'Left stick to fly · drag right side to steer · BOOST to burn'
      : 'WASD to fly · drag mouse to steer · SHIFT to boost'), 2600);
    setTimeout(() => tut('goal', 'Follow the SIGNAL in your LOG — find a star and land'), 8000);
  }
}

$('dialogClose').addEventListener('click', () => { G.dialogOpen = false; $('dialogUI').style.display = 'none'; blip(500, 0.12, 0.05); });
$('btnPack').addEventListener('click', () => {
  if (!G.running) return;
  G.uiOpen = true; renderInv(); $('invUI').classList.add('open'); blip(620, 0.1, 0.05);
});
$('invClose').addEventListener('click', () => { G.uiOpen = false; $('invUI').classList.remove('open'); });
$('btnLog').addEventListener('click', () => {
  if (!G.running) return;
  G.uiOpen = true; renderLog(); $('logUI').classList.add('open'); blip(640, 0.1, 0.05);
});
$('logClose').addEventListener('click', () => { G.uiOpen = false; $('logUI').classList.remove('open'); updateQuestTrack(); });
$('dockBoard').addEventListener('click', () => { renderBoard(); $('boardUI').classList.add('open'); blip(700, 0.1, 0.05); });
$('boardClose').addEventListener('click', () => $('boardUI').classList.remove('open'));

/* ---------------- GALAXY MAP ---------------- */
let mapLayerY = 0;
function renderMap() {
  const c = $('mapCanvas'), ctx = c.getContext('2d');
  const N = 9, cell = c.width / N;
  const sx0 = Math.floor(G.pos.x / SECTOR_SIZE), sy0 = mapLayerY, sz0 = Math.floor(G.pos.z / SECTOR_SIZE);
  const mySy = G.mode === 'surface' && G.surface ? G.surface.sector[1] : Math.floor(G.pos.y / SECTOR_SIZE);
  ctx.fillStyle = '#05060f';
  ctx.fillRect(0, 0, c.width, c.height);
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  for (let i = 0; i <= N; i++) {
    ctx.beginPath(); ctx.moveTo(i * cell, 0); ctx.lineTo(i * cell, c.height); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, i * cell); ctx.lineTo(c.width, i * cell); ctx.stroke();
  }
  const half = Math.floor(N / 2);
  for (let dx = -half; dx <= half; dx++) for (let dz = -half; dz <= half; dz++) {
    const sx = sx0 + dx, sz = sz0 + dz;
    if (hash01(G.seed, 'sys', sx, sy0, sz) > 0.5) continue;
    const px = (dx + half + 0.5) * cell, pz = (dz + half + 0.5) * cell;
    ctx.fillStyle = '#ffe9b0';
    ctx.beginPath(); ctx.arc(px, pz, 3.5, 0, 7); ctx.fill();
    ctx.fillStyle = 'rgba(255,233,176,0.15)';
    ctx.beginPath(); ctx.arc(px, pz, 8, 0, 7); ctx.fill();
    if (Math.abs(dx) <= 1 && Math.abs(dz) <= 1) {
      ctx.fillStyle = '#8fa0d8'; ctx.font = '9px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText(starName(G.seed, sx, sy0, sz), px, pz + 16);
    }
  }
  // delivery targets on this layer
  for (const q of (G.quests || [])) {
    if (q.kind !== 'deliver' || q.target[1] !== sy0) continue;
    const dx = q.target[0] - sx0, dz = q.target[2] - sz0;
    if (Math.abs(dx) <= half && Math.abs(dz) <= half) {
      const px = (dx + half + 0.5) * cell, pz = (dz + half + 0.5) * cell;
      ctx.strokeStyle = '#f5a623'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(px, pz, 11, 0, 7); ctx.stroke();
    }
  }
  // player marker (only meaningful on own layer)
  if (sy0 === mySy) {
    const fx = (G.pos.x / SECTOR_SIZE - sx0), fz = (G.pos.z / SECTOR_SIZE - sz0);
    const px = (half + fx) * cell, pz = (half + fz) * cell;
    ctx.save();
    ctx.translate(px, pz);
    ctx.rotate(-G.yaw);
    ctx.fillStyle = '#6cf6ff';
    ctx.beginPath(); ctx.moveTo(0, -7); ctx.lineTo(5, 6); ctx.lineTo(-5, 6); ctx.closePath(); ctx.fill();
    ctx.restore();
  }
  $('mapLayerLbl').textContent = 'Y ' + sy0 + (sy0 === mySy ? ' (you)' : '');
  // target list
  let tl = '';
  for (const q of (G.quests || [])) {
    if (q.kind !== 'deliver') continue;
    const d = Math.max(Math.abs(q.target[0] - sx0), Math.abs(q.target[1] - mySy), Math.abs(q.target[2] - sz0));
    tl += '◈ ' + q.tname + ' — sector ' + q.target.join(',') + ' · dist ' + d + '<br>';
  }
  $('mapTargets').innerHTML = tl || '<span style="color:#5f6b9c;">No courier contracts active.</span>';
}
$('btnMap').addEventListener('click', () => {
  if (!G.running) return;
  if (G.mode === 'surface' && G.inCave) { toast('No signal underground'); return; }
  G.uiOpen = true;
  if (G.mode === 'surface') {
    $('mapTitle').textContent = curPlanet ? curPlanet.name.toUpperCase() + ' — SURVEY' : 'SURVEY';
    $('mapLayerRow').style.display = 'none';
    drawSurfaceMap($('mapCanvas'), 420, 84, true);
    $('mapTargets').innerHTML =
      '<span style="color:#f5a623;">■</span> village &nbsp; <span style="color:#6cc6ff;">◯</span> cave &nbsp; ' +
      '<span style="color:#e060ff;">◆</span> ruin &nbsp; <span style="color:#ff5040;">●</span> creature &nbsp; <span style="color:#f5c623;">▲</span> your ship &nbsp; <span style="color:#fff;">▲</span> you';
  } else {
    $('mapTitle').textContent = 'GALAXY CHART';
    $('mapLayerRow').style.display = 'flex';
    mapLayerY = Math.floor(G.pos.y / SECTOR_SIZE);
    renderMap();
  }
  $('mapUI').classList.add('open'); blip(600, 0.1, 0.05);
});
$('mapClose').addEventListener('click', () => { G.uiOpen = false; $('mapUI').classList.remove('open'); });
$('mapUp').addEventListener('click', () => { mapLayerY++; renderMap(); });
$('mapDown').addEventListener('click', () => { mapLayerY--; renderMap(); });

/* ---------------- SETTINGS ---------------- */
function renderSettings() {
  const rows = [
    ['sound', 'Sound', opts.sound ? 'ON' : 'OFF'],
    ['fast', 'Graphics', opts.fast ? 'FAST' : 'SHARP'],
    ['invert', 'Invert look', opts.invert ? 'ON' : 'OFF'],
    ['erase', 'Erase save', '⚠']
  ];
  $('setList').innerHTML = rows.map(r =>
    '<div class="itemRow"><span class="itemName">' + r[1] + '</span>' +
    '<button class="rowBtn" data-opt="' + r[0] + '">' + r[2] + '</button></div>').join('');
  $('setList').querySelectorAll('[data-opt]').forEach(b => b.addEventListener('click', async () => {
    const k = b.dataset.opt;
    if (k === 'erase') {
      if (!confirm('Erase your voyage permanently?')) return;
      try { if (window.storage) await window.storage.delete(SAVE_KEY); } catch (e) {}
      try { localStorage.removeItem(SAVE_KEY); } catch (e) {}
      location.reload();
      return;
    }
    opts[k] = !opts[k];
    saveOpts(); applyOpts(); renderSettings();
    blip(720, 0.1, 0.05);
  }));
}
$('btnSet').addEventListener('click', () => {
  if (!G.running) return;
  G.uiOpen = true; renderSettings(); $('setUI').classList.add('open');
});
$('setClose').addEventListener('click', () => { G.uiOpen = false; $('setUI').classList.remove('open'); });
$('dockTrade').addEventListener('click', () => { shopTab = 'buy'; setShopTabs(); renderShop(); $('shopUI').classList.add('open'); blip(680, 0.1, 0.05); });
$('shopClose').addEventListener('click', () => $('shopUI').classList.remove('open'));
function setShopTabs() {
  $('tabBuy').classList.toggle('sel', shopTab === 'buy');
  $('tabSell').classList.toggle('sel', shopTab === 'sell');
}
$('tabBuy').addEventListener('click', () => { shopTab = 'buy'; setShopTabs(); renderShop(); });
$('tabSell').addEventListener('click', () => { shopTab = 'sell'; setShopTabs(); renderShop(); });

addEventListener('keydown', e => { if (e.code === 'KeyE' && G.running && G.mode !== 'docked') doInteract(); });
$('btnInteract').addEventListener('touchstart', e => { e.preventDefault(); if (G.mode !== 'docked') doInteract(); }, { passive: false });
$('dockRepair').addEventListener('click', () => {
  if (G.hp >= G.hpMax) { toast('Hull already at full integrity'); return; }
  if (G.credits < 50) { toast('Not enough credits'); return; }
  G.credits -= 50; G.hp = G.hpMax; blip(880, 0.2, 0.06);
  toast('Hull repaired');
});
$('dockSave').addEventListener('click', () => SaveMan.save(snapshot(), false));
$('dockLeave').addEventListener('click', () => { blip(600, 0.15, 0.06); closeDock(); });

(async function boot() {
  await SaveMan.detect();
  const existing = await SaveMan.load();
  if (existing) $('btnContinue').classList.remove('disabled');
  if (SaveMan.backend === null) toast('WARNING: no storage available — progress cannot be saved');
  $('btnNew').addEventListener('click', async () => {
    const existing2 = await SaveMan.load();
    if (existing2 && !confirm('Start a new voyage? Your current save will be overwritten.')) return;
    startGame(true);
  });
  $('btnContinue').addEventListener('click', () => startGame(false));
  initScene();
  requestAnimationFrame(tick);
})();
</script>
