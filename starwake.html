<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>STARWAKE</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { width:100%; height:100%; overflow:hidden; background:#05060f; font-family:'Segoe UI',system-ui,sans-serif; color:#dfe6ff; }
  canvas { display:block; }
  .noselect { user-select:none; -webkit-user-select:none; }

  /* ---------- TITLE SCREEN ---------- */
  #titleScreen { position:fixed; inset:0; z-index:100; display:flex; flex-direction:column;
    align-items:center; justify-content:center; background:radial-gradient(ellipse at 50% 30%, #101635 0%, #05060f 70%);
    transition:opacity 1s; }
  #titleScreen.hidden { opacity:0; pointer-events:none; }
  #titleStars { position:absolute; inset:0; }
  .titleContent { position:relative; text-align:center; z-index:2; }
  #gameLogo { font-size:clamp(44px,11vw,96px); font-weight:900; letter-spacing:0.18em;
    background:linear-gradient(180deg,#ffe9b0 0%, #f5a623 45%, #b8641a 100%);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    text-shadow:0 0 60px rgba(245,166,35,0.25); margin-bottom:4px; }
  #gameTag { font-size:clamp(11px,2.6vw,15px); letter-spacing:0.5em; color:#7f8bc0; margin-bottom:42px; text-transform:uppercase; }
  .menuBtn { display:block; width:min(280px,70vw); margin:10px auto; padding:14px 0;
    font-size:16px; letter-spacing:0.2em; text-transform:uppercase; font-weight:600;
    color:#ffe9b0; background:rgba(245,166,35,0.08); border:1px solid rgba(245,166,35,0.45);
    border-radius:4px; cursor:pointer; transition:background .2s, transform .1s; }
  .menuBtn:active { background:rgba(245,166,35,0.25); transform:scale(0.98); }
  .menuBtn.disabled { opacity:0.3; pointer-events:none; }
  #titleFooter { position:absolute; bottom:18px; width:100%; text-align:center; font-size:11px; color:#4a5480; letter-spacing:0.15em; z-index:2; }

  /* ---------- HUD ---------- */
  #hud { position:fixed; inset:0; z-index:50; pointer-events:none; display:none; }
  #hud.active { display:block; }
  .bars { position:absolute; top:calc(10px + env(safe-area-inset-top)); left:12px; width:min(220px,42vw); }
  .bar { height:12px; border-radius:6px; background:rgba(255,255,255,0.08); margin-bottom:5px; overflow:hidden; border:1px solid rgba(255,255,255,0.12); }
  .bar > div { height:100%; border-radius:6px; transition:width .25s; }
  #hpFill { width:100%; background:linear-gradient(90deg,#e8443a,#ff7a5c); }
  #shFill { width:100%; background:linear-gradient(90deg,#2f7fe8,#6cc6ff); }
  #xpWrap { position:absolute; bottom:calc(8px + env(safe-area-inset-bottom)); left:50%; transform:translateX(-50%); width:min(300px,60vw); text-align:center; }
  #xpBar { height:6px; background:rgba(255,255,255,0.08); border-radius:3px; overflow:hidden; }
  #xpFill { height:100%; width:0%; background:linear-gradient(90deg,#f5a623,#ffe9b0); }
  #lvlText { font-size:11px; color:#c9d2f5; letter-spacing:0.1em; margin-bottom:3px; text-shadow:0 1px 3px #000; }
  #topRight { position:absolute; top:calc(10px + env(safe-area-inset-top)); right:12px; text-align:right; text-shadow:0 1px 4px #000; }
  #credits { font-size:16px; font-weight:700; color:#ffe9b0; }
  #sectorName { font-size:12px; color:#8fa0d8; letter-spacing:0.12em; margin-top:2px; }
  #speedInfo { font-size:11px; color:#5f6b9c; margin-top:2px; }

  /* ---------- TOUCH CONTROLS ---------- */
  #joyZone { position:fixed; left:0; bottom:0; width:45vw; height:55vh; z-index:60; pointer-events:auto; display:none; }
  #joyBase { position:absolute; width:110px; height:110px; border-radius:50%; border:2px solid rgba(255,255,255,0.18);
    background:rgba(255,255,255,0.05); display:none; }
  #joyKnob { position:absolute; width:48px; height:48px; border-radius:50%; background:rgba(245,166,35,0.55);
    border:2px solid rgba(255,233,176,0.7); display:none; }
  #lookZone { position:fixed; right:0; bottom:0; width:55vw; height:70vh; z-index:55; pointer-events:auto; display:none; }
  #btnCluster { position:fixed; right:14px; bottom:calc(90px + env(safe-area-inset-bottom)); z-index:65; display:none; flex-direction:column; gap:12px; }
  .actBtn { width:64px; height:64px; border-radius:50%; border:1px solid rgba(255,233,176,0.5);
    background:rgba(245,166,35,0.16); color:#ffe9b0; font-size:12px; font-weight:700; letter-spacing:0.08em;
    pointer-events:auto; cursor:pointer; }
  .actBtn:active { background:rgba(245,166,35,0.4); }
  .touchOnly { display:none !important; }
  body.touch .touchOnly { display:flex !important; }
  body.touch #joyZone, body.touch #lookZone { display:block; }
  body.touch #btnCluster { display:flex; }

  /* ---------- INTERACT / FADE / DOCK ---------- */
  #interactHint { position:fixed; bottom:calc(70px + env(safe-area-inset-bottom)); left:50%; transform:translateX(-50%);
    background:rgba(10,14,32,0.85); border:1px solid rgba(108,198,255,0.5); color:#cfe6ff;
    padding:7px 16px; border-radius:6px; font-size:13px; letter-spacing:0.06em; z-index:66;
    display:none; pointer-events:none; white-space:nowrap; }
  #interactHint.show { display:block; }
  #fade { position:fixed; inset:0; background:#000; opacity:0; pointer-events:none; transition:opacity .6s; z-index:80; }
  #fade.on { opacity:1; }
  #dockUI { position:fixed; inset:0; z-index:70; display:none; align-items:center; justify-content:center;
    background:rgba(3,5,15,0.72); }
  #dockUI.open { display:flex; }
  .panel { width:min(340px,86vw); background:#0b1024; border:1px solid rgba(245,166,35,0.4);
    border-radius:10px; padding:22px; text-align:center; }
  .panel h2 { font-size:18px; letter-spacing:0.15em; color:#ffe9b0; margin-bottom:4px; }
  .panel .sub { font-size:12px; color:#7f8bc0; margin-bottom:16px; }
  .panelBtn { display:block; width:100%; margin:8px 0; padding:11px 0; font-size:14px; letter-spacing:0.1em;
    color:#dfe6ff; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.18);
    border-radius:5px; cursor:pointer; }
  .panelBtn:active { background:rgba(245,166,35,0.25); }

  /* ---------- COMBAT FX ---------- */
  #hitFlash { position:fixed; inset:0; background:radial-gradient(ellipse, transparent 55%, rgba(232,68,58,0.5) 100%);
    opacity:0; pointer-events:none; z-index:75; transition:opacity .1s; }
  #hitFlash.on { opacity:1; }
  .floatTxt { position:fixed; z-index:68; font-size:15px; font-weight:800; pointer-events:none;
    text-shadow:0 1px 3px #000; animation:floatUp 0.9s ease-out forwards; }
  @keyframes floatUp { from { opacity:1; transform:translate(-50%,0); } to { opacity:0; transform:translate(-50%,-46px); } }

  /* ---------- INVENTORY / SHOP ---------- */
  #btnPack { pointer-events:auto; padding:5px 14px; font-size:11px; letter-spacing:0.15em;
    color:#ffe9b0; background:rgba(245,166,35,0.12); border:1px solid rgba(245,166,35,0.45); border-radius:4px; cursor:pointer; }
  .bigPanel { width:min(400px,92vw); max-height:78vh; background:#0b1024; border:1px solid rgba(245,166,35,0.4);
    border-radius:10px; padding:18px; display:flex; flex-direction:column; }
  .bigPanel h2 { font-size:16px; letter-spacing:0.15em; color:#ffe9b0; margin-bottom:10px; text-align:center; }
  .itemList { overflow-y:auto; flex:1; }
  .itemRow { display:flex; align-items:center; gap:8px; padding:7px 4px; border-bottom:1px solid rgba(255,255,255,0.07); font-size:13px; }
  .itemDot { width:12px; height:12px; border-radius:3px; flex:none; }
  .itemName { flex:1; }
  .itemVal { color:#8fa0d8; font-size:12px; white-space:nowrap; }
  .itemVal .up { color:#7ae87a; } .itemVal .dn { color:#ff8a70; }
  .rowBtn { padding:5px 10px; font-size:11px; letter-spacing:0.08em; color:#dfe6ff;
    background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.2); border-radius:4px; cursor:pointer; white-space:nowrap; }
  .rowBtn:active { background:rgba(245,166,35,0.3); }
  .tabRow { display:flex; gap:6px; margin-bottom:10px; }
  .tabBtn { flex:1; padding:8px 0; font-size:12px; letter-spacing:0.1em; color:#8fa0d8;
    background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.12); border-radius:5px; cursor:pointer; }
  .tabBtn.sel { color:#ffe9b0; border-color:rgba(245,166,35,0.5); background:rgba(245,166,35,0.1); }
  .modalWrap { position:fixed; inset:0; z-index:72; display:none; align-items:center; justify-content:center; background:rgba(3,5,15,0.72); }
  .modalWrap.open { display:flex; }

  /* ---------- TOAST ---------- */
  #toast { position:fixed; top:calc(52px + env(safe-area-inset-top)); left:50%; transform:translateX(-50%);
    background:rgba(10,14,32,0.9); border:1px solid rgba(245,166,35,0.4); color:#ffe9b0;
    padding:8px 18px; border-radius:6px; font-size:13px; letter-spacing:0.05em; z-index:90;
    opacity:0; transition:opacity .3s; pointer-events:none; }
  #toast.show { opacity:1; }
</style>

<script>
/* =====================================================================
   STARWAKE — Phase 1 foundation
   Sections: HASH · NAMES · SAVE · STATE · AUDIO · TITLE · SCENE · INPUT · LOOP
   ===================================================================== */

/* ---------------- HASH GRID CORE ---------------- */
// 32-bit avalanche hash over (seed, ...ints). Deterministic everywhere.
function hashInts() {
  let h = 0x9e3779b9;
  for (let i = 0; i < arguments.length; i++) {
    let k = arguments[i] | 0;
    k = Math.imul(k, 0xcc9e2d51); k = (k << 15) | (k >>> 17); k = Math.imul(k, 0x1b873593);
    h ^= k; h = (h << 13) | (h >>> 19); h = (Math.imul(h, 5) + 0xe6546b64) | 0;
  }
  h ^= h >>> 16; h = Math.imul(h, 0x85ebca6b);
  h ^= h >>> 13; h = Math.imul(h, 0xc2b2ae35);
  h ^= h >>> 16;
  return h >>> 0;
}
// String salt → int
function strHash(s) {
  let h = 2166136261;
  for (let i = 0; i < s.length; i++) { h ^= s.charCodeAt(i); h = Math.imul(h, 16777619); }
  return h >>> 0;
}
// hash01(seed, salt, ...coords) → [0,1)
function hash01(seed, salt) {
  const args = [seed, strHash(salt)];
  for (let i = 2; i < arguments.length; i++) args.push(arguments[i]);
  return hashInts.apply(null, args) / 4294967296;
}
// Seeded PRNG stream for when we need several values from one cell
function cellRng(seed, salt) {
  const args = [seed, strHash(salt)];
  for (let i = 2; i < arguments.length; i++) args.push(arguments[i]);
  let s = hashInts.apply(null, args) || 1;
  return function() {
    s ^= s << 13; s >>>= 0; s ^= s >> 17; s ^= s << 5; s >>>= 0;
    return s / 4294967296;
  };
}

/* ---------------- NAME GENERATION ---------------- */
const NAME_PARTS = {
  starA: ['Vel','Kor','Ash','Ther','Nym','Ozr','Cal','Dre','Ery','Sol','Vaan','Quel','Mir','Zeph','Hal','Ord','Bel','Tyr','Ish','Ner'],
  starB: ['ar','en','ith','or','ax','une','eth','ia','os','ir','al',' um','ev','on','yx'],
  starC: ['a','is','e','us','ei','o',''],
  greek: ['Alpha','Beta','Gamma','Delta','Epsilon','Zeta','Theta','Sigma','Tau','Omega'],
  npcA: ['Bram','Ked','Sylla','Ori','Tavesh','Runa','Joss','Meliv','Dax','Yura','Corin','Pell','Sable','Idra','Vosk','Nima','Ghent','Lyle','Oxa','Farun'],
  npcB: ['Corr','Vane','Ashel','Dross','Kettering','Mola','Ferris','Ostrel','Quint','Harrow','Belfane','Ivex','Sorn','Taliver','Wren']
};
function pick(rng, arr) { return arr[Math.floor(rng() * arr.length)]; }
function starName(seed, sx, sy, sz) {
  const rng = cellRng(seed, 'star', sx, sy, sz);
  let n = pick(rng, NAME_PARTS.starA) + pick(rng, NAME_PARTS.starB).trim();
  if (rng() < 0.4) n += pick(rng, NAME_PARTS.starC);
  if (rng() < 0.3) n = pick(rng, NAME_PARTS.greek) + ' ' + n;
  return n;
}
function sectorName(seed, sx, sy, sz) {
  const rng = cellRng(seed, 'sector', sx, sy, sz);
  return pick(rng, NAME_PARTS.starA) + pick(rng, NAME_PARTS.starB).trim() + ' Reach';
}
function npcName(seed, id1, id2) {
  const rng = cellRng(seed, 'npc', id1, id2);
  return pick(rng, NAME_PARTS.npcA) + ' ' + pick(rng, NAME_PARTS.npcB);
}
function planetName(seed, sx, sy, sz, pi) {
  const rng = cellRng(seed, 'planet', sx, sy, sz, pi);
  let n = pick(rng, NAME_PARTS.starA) + pick(rng, NAME_PARTS.starB).trim();
  if (rng() < 0.5) n += pick(rng, NAME_PARTS.starC);
  if (rng() < 0.25) n += ' ' + ['Prime','Minor','II','III','IV'][Math.floor(rng()*5)];
  return n;
}
function stationName(seed, sx, sy, sz, pi) {
  const rng = cellRng(seed, 'station', sx, sy, sz, pi);
  return pick(rng, NAME_PARTS.npcB) + ' ' + pick(rng, ['Depot','Spire','Anchorage','Relay','Post','Bazaar']);
}

/* ---------------- BIOMES ---------------- */
const BIOMES = [
  { id:'forest', color:0x2e7d3a, ground:0x274d2a, sky:0x86b8e8, fog:0x9cc4e0, label:'Forest World' },
  { id:'ocean',  color:0x2456b8, ground:0x1a4a8f, sky:0x9fc8ef, fog:0xaed4f0, label:'Ocean World' },
  { id:'lakes',  color:0x3a8f6e, ground:0x2e6e52, sky:0x9cc4e8, fog:0xa8cce8, label:'Lake World' },
  { id:'desert', color:0xc9a05a, ground:0xb08a4a, sky:0xe8c89a, fog:0xe0c090, label:'Desert World' },
  { id:'ice',    color:0xcfe8f5, ground:0xb8d8ea, sky:0xd8e8f5, fog:0xd0e4f0, label:'Ice World' },
  { id:'toxic',  color:0x8fb832, ground:0x6e8f28, sky:0xb8c86a, fog:0xaabf60, label:'Toxic World' }
];

/* ---------------- SAVE SYSTEM (two-backend fallback) ---------------- */
const SAVE_KEY = 'starwake_save_v1';
const SaveMan = {
  backend: null,
  async detect() {
    if (window.storage && typeof window.storage.set === 'function') {
      try {
        await window.storage.set(SAVE_KEY + '_probe', '1');
        this.backend = 'cloud'; return;
      } catch (e) { /* fall through */ }
    }
    try {
      localStorage.setItem(SAVE_KEY + '_probe', '1');
      localStorage.removeItem(SAVE_KEY + '_probe');
      this.backend = 'local';
    } catch (e) { this.backend = null; }
  },
  async save(state, silent) {
    const blob = JSON.stringify(state);
    let ok = false, where = '';
    if (this.backend === 'cloud') {
      try { await window.storage.set(SAVE_KEY, blob); ok = true; where = 'cloud'; } catch (e) {}
    }
    if (!ok) {
      try { localStorage.setItem(SAVE_KEY, blob); ok = true; where = 'device'; this.backend = 'local'; } catch (e) {}
    }
    if (!silent) toast(ok ? ('Saved (' + where + ')') : 'SAVE FAILED — progress not stored!');
    else if (!ok) toast('SAVE FAILED — progress not stored!');
    return ok;
  },
  async load() {
    if (this.backend === 'cloud') {
      try {
        const r = await window.storage.get(SAVE_KEY);

    }

      const raw = localStorage.getItem(SAVE_KEY);

};

function xpForLevel(l) { return Math.floor(80 * Math.pow(l, 1.5)); }
function recalcStats() {
  const sh = G.ship || { eng: 1, hull: 1, shld: 1 };
  G.hpMax = 100 + (G.level - 1) * 12 + (sh.hull - 1) * 30;
  G.shieldMax = 50 + (G.level - 1) * 8 + (sh.shld - 1) * 25;
}
function gainXP(n) {
  G.xp += n;
  let leveled = false;
  while (G.xp >= xpForLevel(G.level)) { G.xp -= xpForLevel(G.level); G.level++; leveled = true; }
  if (leveled) {
    recalcStats();
    G.hp = G.hpMax; G.shield = G.shieldMax;
    toast('LEVEL UP — now level ' + G.level); blip(880, 0.35, 0.09); blip(1320, 0.4, 0.06);
  }
}
function snapshot() {
  return { seed: G.seed, pos: G.pos, yaw: G.yaw, pitch: G.pitch, hp: G.hp, shield: G.shield,
    credits: G.credits, level: G.level, xp: G.xp, playtime: G.playtime,

    tut: G.tut || {} };
}
function restore(s) {
  G.seed = s.seed; G.pos = s.pos || {x:0,y:0,z:0}; G.yaw = s.yaw || 0; G.pitch = s.pitch || 0;
  G.hp = s.hp; G.shield = s.shield; G.credits = s.credits; G.level = s.level; G.xp = s.xp;
  G.playtime = s.playtime || 0;

/* ---------------- AUDIO ---------------- */
let AC = null, masterGain = null;
function audioInit() {
  if (AC) return;
  try {
    AC = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = AC.createGain();
    masterGain.gain.value = opts.sound ? 1 : 0;
    masterGain.connect(AC.destination);
    Music.start();
  } catch (e) {}
}
function blip(freq, dur, vol) {
  if (!AC) return;
  const o = AC.createOscillator(), g = AC.createGain();
  o.frequency.value = freq; o.type = 'triangle';
  g.gain.setValueAtTime(vol || 0.08, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, AC.currentTime + (dur || 0.15));
  o.connect(g); g.connect(masterGain);
  o.start(); o.stop(AC.currentTime + (dur || 0.15));
}
function mnote(f, t, dur, vol, wave) {
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = wave || 'sine'; o.frequency.value = f;
  g.gain.setValueAtTime(0.0001, t);
  g.gain.linearRampToValueAtTime(vol, t + Math.min(0.8, dur * 0.35));
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.connect(g); g.connect(masterGain);
  o.start(t); o.stop(t + dur + 0.05);
}
const Music = {
  mode: 'space', nextBar: 0, iv: null,
  P: {
    space:   { root: 110,    scale: [0, 3, 5, 7, 10], pad: [0, 7, 10], bar: 4.5, pluckP: 0.55, wave: 'triangle', vol: 0.028 },
    surface: { root: 130.81, scale: [0, 2, 4, 7, 9],  pad: [0, 4, 7],  bar: 3.6, pluckP: 0.75, wave: 'sine',     vol: 0.032 },
    cave:    { root: 82.4,   scale: [0, 1, 5, 6, 10], pad: [0, 6],     bar: 5.2, pluckP: 0.3,  wave: 'sine',     vol: 0.03 }
  },
  setMode(m) { this.mode = m; },
  start() { if (this.iv) return; this.iv = setInterval(() => this.pump(), 300); },
  pump() {
    if (!AC || !opts.sound || !G.running || G.mode === 'docked') return;
    if (AC.currentTime < this.nextBar - 0.25) return;
    const t = Math.max(AC.currentTime + 0.05, this.nextBar);
    this.playBar(t);
    this.nextBar = t + this.P[this.mode].bar;
  },
  playBar(t) {
    const p = this.P[this.mode];
    const semi = s => p.root * Math.pow(2, s / 12);
    for (const s of p.pad) {
      mnote(semi(s) * 0.999, t, p.bar * 1.05, p.vol, p.wave);
      mnote(semi(s) * 1.002, t, p.bar * 1.05, p.vol * 0.7, p.wave);
    }
    let off = 0.4 + Math.random() * 0.6;
    while (off < p.bar - 0.4) {
      if (Math.random() < p.pluckP) {
        const s = p.scale[Math.floor(Math.random() * p.scale.length)] + 12 * (1 + Math.floor(Math.random() * 2));
        mnote(semi(s), t + off, 0.5 + Math.random() * 0.5, 0.035, 'sine');
      }
      off += 0.7 + Math.random() * 0.9;
    }
  }
};

function buildShip() {

/* ---------------- STAR SYSTEMS (hash grid) ---------------- */
const loadedSystems = new Map();   // key -> { data..., group }
let lastSectorKey = null;

function systemData(sx, sy, sz) {
  if (hash01(G.seed, 'sys', sx, sy, sz) > 0.5) return null;   // 50% of sectors have a system
  const rng = cellRng(G.seed, 'sysgen', sx, sy, sz);
  const cx = (sx + 0.5) * SECTOR_SIZE + (rng() - 0.5) * 600;
  const cy = (sy + 0.5) * SECTOR_SIZE + (rng() - 0.5) * 600;
  const cz = (sz + 0.5) * SECTOR_SIZE + (rng() - 0.5) * 600;
  const starColors = [0xffd9a0, 0xfff4d6, 0xaecbff, 0xffb37a, 0xf0f0ff];
  const star = { pos: new THREE.Vector3(cx, cy, cz),
    color: starColors[Math.floor(rng() * starColors.length)],
    size: 90 + rng() * 70, name: starName(G.seed, sx, sy, sz) };
  const nP = 2 + Math.floor(rng() * 4);
  const planets = [];
  for (let i = 0; i < nP; i++) {
    const orbit = 320 + i * (170 + rng() * 90);
    const ang = rng() * Math.PI * 2;
    const incl = (rng() - 0.5) * 0.5;
    const pos = new THREE.Vector3(
      cx + Math.cos(ang) * orbit,
      cy + Math.sin(ang) * orbit * Math.sin(incl),
      cz + Math.sin(ang) * orbit * Math.cos(incl));
    planets.push({
      idx: i, pos, radius: 28 + rng() * 42,
      biome: BIOMES[Math.floor(rng() * BIOMES.length)],
      name: planetName(G.seed, sx, sy, sz, i),
      hasRings: rng() < 0.22,
      station: (i === 0 || rng() < 0.25) ? {
        pos: pos.clone().add(new THREE.Vector3(0, 0, 0).setFromSphericalCoords(1, rng()*Math.PI, rng()*6.28).multiplyScalar(28 + rng()*42 + 70)),
        name: stationName(G.seed, sx, sy, sz, i)
      } : null,
      sector: [sx, sy, sz]
    });
  }
  const clusters = [];
  const nCl = 1 + Math.floor(rng() * 2);
  for (let c = 0; c < nCl; c++) {
    const a = rng() * 6.28, r = 500 + rng() * 500;
    const ctr = new THREE.Vector3(cx + Math.cos(a) * r, cy + (rng() - 0.5) * 300, cz + Math.sin(a) * r);
    const rocks = [];
    const nR = 7 + Math.floor(rng() * 7);
    for (let i = 0; i < nR; i++) {
      rocks.push({
        pos: ctr.clone().add(new THREE.Vector3((rng() - 0.5) * 160, (rng() - 0.5) * 100, (rng() - 0.5) * 160)),
        size: 4 + rng() * 8,
        ore: rng() < 0.6 ? 'ferrite' : (rng() < 0.75 ? 'cobalt' : 'aurum'),
        id: sx + ',' + sy + ',' + sz + ':a' + c + '_' + i
      });
    }
    clusters.push(rocks);
  }
  return { star, planets, asteroids: clusters.flat() };
}

function buildSystemGroup(d) {
  const grp = new THREE.Group();
  const starMesh = new THREE.Mesh(new THREE.SphereGeometry(d.star.size, 20, 20),
    new THREE.MeshBasicMaterial({ color: d.star.color }));
  starMesh.position.copy(d.star.pos);
  const halo = new THREE.Mesh(new THREE.SphereGeometry(d.star.size * 1.35, 20, 20),
    new THREE.MeshBasicMaterial({ color: d.star.color, transparent: true, opacity: 0.18 }));
  halo.position.copy(d.star.pos);
  grp.add(starMesh, halo);
  for (const p of d.planets) {
    const m = new THREE.Mesh(new THREE.SphereGeometry(p.radius, 22, 22),
      new THREE.MeshStandardMaterial({ color: p.biome.color, roughness: 0.85, metalness: 0.05 }));
    m.position.copy(p.pos); p.mesh = m; grp.add(m);
    const atmo = new THREE.Mesh(new THREE.SphereGeometry(p.radius * 1.08, 22, 22),
      new THREE.MeshBasicMaterial({ color: p.biome.sky, transparent: true, opacity: 0.16, side: THREE.BackSide }));
    atmo.position.copy(p.pos); grp.add(atmo);
    if (p.hasRings) {
      const ring = new THREE.Mesh(new THREE.RingGeometry(p.radius * 1.4, p.radius * 2.1, 40),
        new THREE.MeshBasicMaterial({ color: 0xd8cba8, transparent: true, opacity: 0.4, side: THREE.DoubleSide }));
      ring.position.copy(p.pos); ring.rotation.x = Math.PI / 2.4; grp.add(ring);
    }
    if (p.station) {
      const st = new THREE.Group();
      const core = new THREE.Mesh(new THREE.BoxGeometry(10, 10, 10),
        new THREE.MeshStandardMaterial({ color: 0x9aa4c8, metalness: 0.7, roughness: 0.3 }));
      const tor = new THREE.Mesh(new THREE.TorusGeometry(16, 2.2, 8, 24),
        new THREE.MeshStandardMaterial({ color: 0xf5a623, metalness: 0.5, roughness: 0.4, emissive: 0x3a2400 }));
      st.add(core, tor); st.position.copy(p.station.pos);
      p.station.mesh = st; grp.add(st);
    }
  }
  const rockMat = new THREE.MeshStandardMaterial({ color: 0x6e7280, roughness: 0.95 });
  for (const r of d.asteroids) {
    if (minedRocks.has(r.id)) { r.mesh = null; continue; }
    const m = new THREE.Mesh(new THREE.IcosahedronGeometry(r.size, 0), rockMat);
    m.position.copy(r.pos);
    m.rotation.set(r.size, r.size * 2, r.size * 3);
    m.userData = { rock: r, hp: 24 };
    r.mesh = m;
    grp.add(m);
  }
  return grp;
}

function updateSystems() {
  const sx = Math.floor(G.pos.x / SECTOR_SIZE), sy = Math.floor(G.pos.y / SECTOR_SIZE), sz = Math.floor(G.pos.z / SECTOR_SIZE);
  const key = sx + ',' + sy + ',' + sz;
  if (key !== lastSectorKey) {
    lastSectorKey = key;
    const needed = new Set();
    for (let dx = -1; dx <= 1; dx++) for (let dy = -1; dy <= 1; dy++) for (let dz = -1; dz <= 1; dz++) {
      const k = (sx+dx) + ',' + (sy+dy) + ',' + (sz+dz);
      needed.add(k);
      if (!loadedSystems.has(k)) {
        const d = systemData(sx+dx, sy+dy, sz+dz);
        if (d) { d.group = buildSystemGroup(d); scene.add(d.group); spawnPirates(d, sx+dx, sy+dy, sz+dz); }
        loadedSystems.set(k, d);
      }
    }
    for (const [k, v] of loadedSystems) {
      if (!needed.has(k)) { if (v) scene.remove(v.group); loadedSystems.delete(k); }
    }
  }
  // Idle animation
  for (const v of loadedSystems.values()) {
    if (!v) continue;
    for (const p of v.planets) { if (p.mesh) p.mesh.rotation.y += 0.0006; if (p.station && p.station.mesh) p.station.mesh.rotation.y += 0.004; }
  }
}

/* ---------------- INTERACTION (land / dock) ---------------- */
let interactTarget = null;
function checkInteract() {
  interactTarget = null;
  let best = 1e9;
  for (const v of loadedSystems.values()) {
    if (!v) continue;
    for (const p of v.planets) {
      const dP = p.pos.distanceTo(ship.position) - p.radius;
      if (dP < 130 && dP < best) { best = dP; interactTarget = { type: 'land', planet: p }; }
      if (p.station) {
        const dS = p.station.pos.distanceTo(ship.position);
        if (dS < 90 && dS < best) { best = dS; interactTarget = { type: 'dock', planet: p }; }
      }
    }
  }
  const hint = $('interactHint'), btn = $('btnInteract');
  if (interactTarget) {
    const t = interactTarget;
    if (t.type === 'land') tut('land', 'A world in reach — tap LAND to set down');
    if (t.type === 'dock') tut('dock', 'A station — DOCK to trade, take jobs, and repair');
    hint.textContent = t.type === 'land'
      ? ('LAND — ' + t.planet.name + ' (' + t.planet.biome.label + ')' + (document.body.classList.contains('touch') ? '' : '  [E]'))
      : ('DOCK — ' + t.planet.station.name + (document.body.classList.contains('touch') ? '' : '  [E]'));
    hint.classList.add('show');
    btn.style.display = 'block'; btn.textContent = t.type === 'land' ? 'LAND' : 'DOCK';
  } else {
    hint.classList.remove('show'); btn.style.display = 'none';
  }
}

function fadeThrough(mid) {
  $('fade').classList.add('on');

}

function doInteract() {
  if (G.mode === 'surface') { surfaceDoInteract(); return; }
  if (!interactTarget) return;
  blip(740, 0.18, 0.07);

}

const CHUNK = 80, CHUNK_SEG = 16, VIEW_R = 2;
const BIOME_TERRAIN = {
  forest: { amp: 14, freq: 0.012, base: 4.5, water: -2.2, shore: 0x8a7a4e, high: 0x6b6f6e, decorN: 13 },
  ocean:  { amp: 17, freq: 0.010, base: -9, water: 0, shore: 0xd8c88f, high: 0x4a7a3a, decorN: 6 },
  lakes:  { amp: 12, freq: 0.013, base: 2.2, water: -1.6, shore: 0x9a8a5e, high: 0x5e7a5a, decorN: 10 },
  desert: { amp: 9,  freq: 0.008, base: 2, water: null, shore: 0xb08a4a, high: 0xd8b87a, decorN: 6 },
  ice:    { amp: 11, freq: 0.011, base: 3, water: -1.2, ice: true, shore: 0xdaeaf5, high: 0xf5fbff, decorN: 7 },
  toxic:  { amp: 19, freq: 0.016, base: 5, water: -1.8, acid: true, shore: 0x7a8a3a, high: 0x4e5e2a, decorN: 9 }
};
function smoothstep(t) { return t * t * (3 - 2 * t); }
function vnoise(pk, x, z) {
  const xi = Math.floor(x), zi = Math.floor(z);
  const fx = smoothstep(x - xi), fz = smoothstep(z - zi);
  const a = hash01(pk, 'h', xi, zi),     b = hash01(pk, 'h', xi + 1, zi);
  const c = hash01(pk, 'h', xi, zi + 1), d = hash01(pk, 'h', xi + 1, zi + 1);
  return (a + (b - a) * fx) + ((c + (d - c) * fx) - (a + (b - a) * fx)) * fz;
}
function terrainH(pk, x, z, bt) {
  let amp = bt.amp, f = bt.freq, h = bt.base || 0;
  for (let o = 0; o < 3; o++) {
    h += (vnoise(pk, x * f, z * f) - 0.5) * 2 * amp;
    amp *= 0.45; f *= 2.3;
  }
  return h;
}

/* -------- merged decoration geometry helpers -------- */
const _protoGeos = {};
function protoGeo(name) {
  if (_protoGeos[name]) return _protoGeos[name];
  let g;

/* -------- chunk build -------- */
const surfaceChunks = new Map();
let surfaceGroup = null, landedShip = null, waterMesh = null;
let curPlanet = null, curPK = 0, curBT = null, baseSky = null, baseFog = null;

function decorSpec(biomeId, r) {

    case 'forest': return r < 0.75 ? 'tree' : 'rock';
    case 'lakes':  return r < 0.6 ? 'tree' : 'rock';
    case 'ocean':  return r < 0.5 ? 'tree' : 'rock';
    case 'desert': return r < 0.55 ? 'cactus' : 'rock';

function buildChunk(cx, cz) {
  const grp = new THREE.Group();

  const bt = curBT, biome = curPlanet.biome;

  const geo = new THREE.PlaneGeometry(CHUNK, CHUNK, CHUNK_SEG, CHUNK_SEG);
  geo.rotateX(-Math.PI / 2);

  const cGround = new THREE.Color(biome.ground), cShore = new THREE.Color(bt.shore), cHigh = new THREE.Color(bt.high);
  const wl = bt.water === null ? -1e9 : bt.water;
  for (let i = 0; i < pos.count; i++) {
    const wx = pos.getX(i) + cx * CHUNK, wz = pos.getZ(i) + cz * CHUNK;
    const h = terrainH(curPK, wx, wz, bt);
    pos.setY(i, h);
    let c;
    if (h < wl + 0.8) c = cShore;
    else if (h > bt.amp * 0.55) c = cHigh;
    else c = cGround;
    const jit = 0.92 + hash01(curPK, 'cj', Math.round(wx * 2), Math.round(wz * 2)) * 0.16;
    cols.push(c.r * jit, c.g * jit, c.b * jit);

  geo.computeVertexNormals();
  const ter = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ vertexColors: true, roughness: 0.95 }));
  ter.position.set(cx * CHUNK, 0, cz * CHUNK);
  grp.add(ter);

  // decorations (merged into one mesh)
  const rng = cellRng(curPK, 'decor', cx, cz);
  const arr = { pos: [], col: [] };
  const isVillage = hash01(curPK, 'vil', cx, cz) < 0.07;
  const hasCave = !isVillage && hash01(curPK, 'cave', cx, cz) < 0.09;
  const hasRuin = !isVillage && !hasCave && hash01(curPK, 'ruin', cx, cz) < 0.035;

  for (let i = 0; i < bt.decorN; i++) {
    const lx = (rng() - 0.5) * CHUNK * 0.94, lz = (rng() - 0.5) * CHUNK * 0.94;
    const wx = lx + cx * CHUNK, wz = lz + cz * CHUNK;
    const h = terrainH(curPK, wx, wz, bt);
    if (h < wl + 0.5) continue;                       // nothing under water
    const kind = decorSpec(biome.id, rng());
    const s = 0.7 + rng() * 0.9, ry = rng() * 6.28;
    if (kind === 'tree') {

      pushGeom(arr, 'crown', wx, h + (3 + 2.1) * s * 0.8, wz, s, ry, biome.id === 'toxic' ? 0x9ab832 : 0x2e6e34);
    } else if (kind === 'cactus') {
      pushGeom(arr, 'cactus', wx, h + 1.6 * s, wz, s, ry, 0x4e8a3a);
    } else if (kind === 'shard') {
      pushGeom(arr, 'shard', wx, h + 1.5 * s, wz, s, ry, biome.id === 'toxic' ? 0x6e8f28 : 0xcfe8f5);
    } else if (kind === 'growth') {
      pushGeom(arr, 'growth', wx, h + 0.8 * s, wz, s, ry, 0x8fb832);
    } else {
      pushGeom(arr, 'rock', wx, h + 0.5 * s, wz, s, ry, 0x8a8a92);
    }
  }

  // village: huts + NPCs on flat-enough ground
  if (isVillage) {
    const vcx = cx * CHUNK, vcz = cz * CHUNK;
    const h0 = terrainH(curPK, vcx, vcz, bt);
    const slope = Math.abs(terrainH(curPK, vcx + 14, vcz, bt) - h0) + Math.abs(terrainH(curPK, vcx, vcz + 14, bt) - h0);
    if (h0 > wl + 1 && slope < 5) {
      grp.userData.village = { name: sectorName(curPK, cx, cz, 7).replace(' Reach', ' Hollow') };
      const vr = cellRng(curPK, 'vgen', cx, cz);
      const nHuts = 3 + Math.floor(vr() * 3);
      for (let i = 0; i < nHuts; i++) {
        const a = (i / nHuts) * 6.28 + vr(), r = 10 + vr() * 8;
        const hx = vcx + Math.cos(a) * r, hz = vcz + Math.sin(a) * r;
        const hh = terrainH(curPK, hx, hz, bt);
        pushGeom(arr, 'hutWall', hx, hh + 1.3, hz, 1, vr() * 6.28, 0x8a6e4e);
        pushGeom(arr, 'hutRoof', hx, hh + 3.7, hz, 1, vr() * 6.28, 0xa8452e);

      for (let i = 0; i < nNpc; i++) {
        const a = vr() * 6.28, r = 3 + vr() * 9;
        const nx = vcx + Math.cos(a) * r, nz = vcz + Math.sin(a) * r;
        const nh = terrainH(curPK, nx, nz, bt);
        const npc = buildNPC(vr);
        npc.position.set(nx, nh, nz);
        npc.userData = { name: npcName(curPK, cx * 97 + cz, i), baseY: nh, ph: vr() * 6.28,
          qkey: hashInts(curPK, strHash('nq'), cx * 131 + cz * 7, i) | 0 };
        grp.add(npc);

  // cave entrance

    const rngC = cellRng(curPK, 'cgen', cx, cz);
    const ex = cx * CHUNK + (rngC() - 0.5) * CHUNK * 0.6, ez = cz * CHUNK + (rngC() - 0.5) * CHUNK * 0.6;

      pushGeom(arr, 'caveRing', ex, eh + 0.3, ez, 1, Math.PI / 2, 0x6cc6ff);
      grp.userData.cave = { x: ex, z: ez, key: curPK + ':' + cx + ',' + cz };
    }
  }

  // ancient ruin (precursor obelisk)
  if (hasRuin) {
    const rRng = cellRng(curPK, 'rgen', cx, cz);
    const rx = cx * CHUNK + (rRng() - 0.5) * CHUNK * 0.5, rz = cz * CHUNK + (rRng() - 0.5) * CHUNK * 0.5;
    const rh = terrainH(curPK, rx, rz, bt);
    if (rh > wl + 0.5) {
      pushGeom(arr, 'trunk', rx, rh + 4.5, rz, 3.2, rRng() * 6.28, 0x2a2a3a);   // tall dark monolith
      pushGeom(arr, 'caveRing', rx, rh + 8.6, rz, 1.4, Math.PI / 2, 0xe060ff);  // hovering glyph ring
      pushGeom(arr, 'rock', rx + 3, rh + 0.6, rz + 2, 1.4, rRng() * 6.28, 0x3a3a4a);
      pushGeom(arr, 'rock', rx - 2.6, rh + 0.5, rz - 2.2, 1.1, rRng() * 6.28, 0x3a3a4a);
      grp.userData.ruin = { x: rx, z: rz, key: curPK + ':r:' + cx + ',' + cz };
    }
  }

  // harvestable flora
  grp.userData.flora = [];
  {
    const fRng = cellRng(curPK, 'flora', cx, cz);
    let nF = fRng() < 0.55 ? 1 + Math.floor(fRng() * 2) : 0;
    if (curRich && nF > 0) nF += 1;
    const fId = 'flora_' + biome.id;
    const fKey = curPK + ':f:' + cx + ',' + cz;
    const taken = (G.found && G.found[fKey]) || 0;
    for (let i = 0; i < nF; i++) {
      const wx = cx * CHUNK + (fRng() - 0.5) * CHUNK * 0.85;
      const wz = cz * CHUNK + (fRng() - 0.5) * CHUNK * 0.85;
      if (taken & (1 << i)) continue;

      if (h < wl + 0.5) continue;
      const fl = new THREE.Group();
      const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.12, 1.1, 5),
        new THREE.MeshStandardMaterial({ color: 0x3a6e3a, roughness: 0.9 }));

      const n = 1 + (eRng() < 0.35 ? 1 : 0);
      for (let i = 0; i < n; i++) {

        const wz = cz * CHUNK + (eRng() - 0.5) * CHUNK * 0.8;

        if (h < wl + 0.5) continue;
        const e = buildCreature(BIOME_CREATURE[biome.id], elvl);
        e.position.set(wx, h, wz);
        grp.add(e);
        grp.userData.enemies.push(e);

}

function updateChunks(force) {

      surfaceChunks.set(k, g);

    caveGroup.add(arrToMesh(arr));

let surfTarget = null;
function surfaceCheckInteract() {
  surfTarget = null;
  let best = 1e9;
  if (G.inCave) {
    for (const cr of caveCrystals) {
      const d = Math.hypot(cr.position.x - G.walk.x, cr.position.z - G.walk.z);
      if (d < 4.5 && d < best) { best = d; surfTarget = { type: 'crystal', cr }; }
    }
    const ex = caveGroup.userData.exit;
    const dE = Math.hypot(ex.x - G.walk.x, ex.z - G.walk.z);
    if (dE < 5 && dE < best) { best = dE; surfTarget = { type: 'exitCave' }; }
  } else {
    for (const g of surfaceChunks.values()) {
      for (const npc of g.userData.npcs) {
        const d = Math.hypot(npc.position.x - G.walk.x, npc.position.z - G.walk.z);
        if (d < 6 && d < best) { best = d; surfTarget = { type: 'npc', npc, village: g.userData.village }; }
      }
      for (const fl of g.userData.flora || []) {
        const d = Math.hypot(fl.position.x - G.walk.x, fl.position.z - G.walk.z);
        if (d < 4.5 && d < best) { best = d; surfTarget = { type: 'flora', fl }; }
      }
      if (g.userData.ruin) {
        const d = Math.hypot(g.userData.ruin.x - G.walk.x, g.userData.ruin.z - G.walk.z);
        if (d < 7 && d < best) { best = d; surfTarget = { type: 'ruin', ruin: g.userData.ruin }; }
      }
      if (g.userData.cave) {
        const d = Math.hypot(g.userData.cave.x - G.walk.x, g.userData.cave.z - G.walk.z);
        if (d < 7 && d < best) { best = d; surfTarget = { type: 'cave', cave: g.userData.cave }; }
      }
    }
    const dS = Math.hypot(landedShip.position.x - G.walk.x, landedShip.position.z - G.walk.z);
    if (dS < 15 && dS < best) { best = dS; surfTarget = { type: 'lift' }; }
  }
  const hint = $('interactHint'), btn = $('btnInteract');
  const kb = document.body.classList.contains('touch') ? '' : '  [E]';
  if (surfTarget) {
    const labels = { crystal: 'COLLECT CRYSTAL', exitCave: 'LEAVE CAVE', npc: 'TALK', cave: 'ENTER CAVE', lift: 'TAKE OFF', flora: 'HARVEST', ruin: 'READ THE OBELISK' };
    const btnLabels = { crystal: 'TAKE', exitCave: 'LEAVE', npc: 'TALK', cave: 'ENTER', lift: 'LIFT', flora: 'PICK', ruin: 'READ' };
    let txt = labels[surfTarget.type];
    if (surfTarget.type === 'npc') txt += ' — ' + surfTarget.npc.userData.name;
    if (surfTarget.type === 'flora') txt += ' — ' + ITEMS[surfTarget.fl.userData.fId].n;
    hint.textContent = txt + kb;
    hint.classList.add('show');
    btn.style.display = 'block'; btn.textContent = btnLabels[surfTarget.type];
  } else { hint.classList.remove('show'); btn.style.display = 'none'; }
}

function surfaceTick(dt) {
  if (G.dialogOpen) { renderer.render(scene, camera); return; }
  const kf = (keys['KeyW'] ? 1 : 0) - (keys['KeyS'] ? 1 : 0);
  const ks = (keys['KeyD'] ? 1 : 0) - (keys['KeyA'] ? 1 : 0);
  let fwd = joyId !== null ? input.fwd : kf || input.fwd;
  const str = joyId !== null ? input.strafe : ks || input.strafe;
  const boosting = input.boost || keys['ShiftLeft'];
  if (boosting && Math.abs(fwd) < 0.05 && Math.abs(str) < 0.05) fwd = 1;   // boost alone = sprint forward
  G.walk.yaw -= input.lookX; input.lookX = 0; input.lookY = 0;
  const cy = Math.cos(G.walk.yaw), sy = Math.sin(G.walk.yaw);

  let py, speedMul = 1;
  if (G.inCave) {
    const fy = caveGroup.userData.floorY;
    const nx = G.walk.x + (-sy * fwd + cy * str) * 12 * dt;
    const nz = G.walk.z + (-cy * fwd - sy * str) * 12 * dt;
    if (Math.hypot(nx, nz) < 26) { G.walk.x = nx; G.walk.z = nz; }
    py = fy;
    for (const cr of caveCrystals) cr.rotation.y += dt * 1.5;
  } else {
    const sp = boosting ? 26 : 12;
    const h = terrainH(curPK, G.walk.x, G.walk.z, curBT);
    const wl = curBT.water === null ? -1e9 : curBT.water;
    let swimming = false;
    if (curBT.ice) py = Math.max(h, wl);
    else if (h < wl - 0.4) { py = wl - 0.4; swimming = true; speedMul = 0.5; }
    else py = h;
    if (swimming && curBT.acid) {
      G.hp -= 4 * dt;
      if (Math.random() < dt * 2) toast('ACID — get out of the water!');
    }
    G.walk.x += (-sy * fwd + cy * str) * sp * speedMul * dt;
    G.walk.z += (-cy * fwd - sy * str) * sp * speedMul * dt;
    updateChunks(false);
    if (waterMesh) { waterMesh.position.x = G.walk.x; waterMesh.position.z = G.walk.z; }
    // day/night
    const dayA = (G.playtime * 0.012) % (Math.PI * 2);
    const dayF = Math.max(0.16, Math.sin(dayA) * 0.5 + 0.55);
    sunLight.position.set(Math.cos(dayA) * 400, Math.sin(dayA) * 400, 150);
    sunLight.intensity = Math.max(0.1, Math.sin(dayA)) * 1.15;
    ambLight.intensity = 0.35 + dayF * 0.45;
    scene.background.copy(baseSky).multiplyScalar(dayF);
    scene.fog.color.copy(baseFog).multiplyScalar(dayF);
    // NPC idle bob
    for (const g of surfaceChunks.values())
      for (const npc of g.userData.npcs)
        npc.position.y = npc.userData.baseY + Math.sin(G.playtime * 2 + npc.userData.ph) * 0.06;
  }

  surfaceCombatTick(dt);

  // death / respawn
  if (G.hp <= 0) {
    G.hp = Math.floor(G.hpMax * 0.5); G.shield = 0;
    G.walk.x = landedShip ? landedShip.position.x + 4 : 0;
    G.walk.z = landedShip ? landedShip.position.z + 4 : 0;
    if (G.inCave) { G.inCave = null; if (caveGroup) { scene.remove(caveGroup); caveGroup = null; caveCrystals = []; caveEnemies = []; surfaceGroup.visible = true; scene.background = baseSky.clone(); scene.fog = new THREE.FogExp2(baseFog.getHex(), 0.0035); } }
    toast('You blacked out — recovered at your ship');
  }

  camera.position.set(G.walk.x + sy * 9, py + 5.2, G.walk.z + cy * 9);
  camera.lookAt(G.walk.x - sy * 10, py + 2.4, G.walk.z - cy * 10);
  if (!G.inCave) tickMiniMap(dt);
  surfaceCheckInteract();
}

/* -------- station prices (hash-grid market) -------- */
function stationKeyOf(p) {
  return hashInts(G.seed, strHash('stk'), p.sector[0], p.sector[1], p.sector[2], p.idx) | 0;
}
function priceMult(stKey, itemId) {
  return 0.7 + hash01(stKey, 'price', strHash(itemId)) * 0.7;   // 0.7 – 1.4
}
function sellPrice(stKey, id) { return Math.max(1, Math.round(ITEMS[id].base * priceMult(stKey, id))); }
function buyPrice(stKey, id) { return Math.max(2, Math.round(ITEMS[id].base * priceMult(stKey, id) * 1.3)); }

/* ---------------- QUESTS ---------------- */
const MAX_QUESTS = 6;
function sectorDistNow() {
  let s;
  if (G.mode === 'surface' && G.surface) s = G.surface.sector;
  else s = [Math.floor(G.pos.x / SECTOR_SIZE), Math.floor(G.pos.y / SECTOR_SIZE), Math.floor(G.pos.z / SECTOR_SIZE)];
  return Math.max(Math.abs(s[0]), Math.abs(s[1]), Math.abs(s[2]));
}
function questReward(elvl, mul) {
  return { cr: Math.round((40 + elvl * 25) * (mul || 1)), xp: Math.round((30 + elvl * 18) * (mul || 1)) };
}
function findDeliverTarget(rng, from) {
  for (let t = 0; t < 12; t++) {
    const dx = (2 + Math.floor(rng() * 3)) * (rng() < 0.5 ? -1 : 1);
    const dz = (1 + Math.floor(rng() * 3)) * (rng() < 0.5 ? -1 : 1);
    const c = [from[0] + dx, from[1], from[2] + dz];
    if (hash01(G.seed, 'sys', c[0], c[1], c[2]) <= 0.5) return c;
  }
  return null;
}
function makeQuest(qkey, kind, biomeId, sector) {
  const rng = cellRng(qkey, 'q');
  const elvl = enemyLevelAt(sector[0], sector[1], sector[2]);
  const q = { id: qkey, kind, n: 0 };
  if (kind === 'hunt') {
    q.ckind = BIOME_CREATURE[biomeId] || 'stalker';
    q.need = 3 + Math.floor(rng() * 2);
    q.title = 'Cull the ' + q.ckind + 's';
    q.desc = 'Slay ' + q.need + ' ' + q.ckind + 's. They press too close to the settlements.';
    Object.assign(q, questReward(elvl, 1));
  } else if (kind === 'fetch') {
    q.item = rng() < 0.5 ? ('flora_' + biomeId) : (CREATURE_DROP[BIOME_CREATURE[biomeId]] || 'hide');
    q.need = 3 + Math.floor(rng() * 3);
    q.title = 'Gather ' + ITEMS[q.item].n;
    q.desc = 'Bring ' + q.need + ' × ' + ITEMS[q.item].n + '. Turn in from your voyage log.';
    Object.assign(q, questReward(elvl, 1.1));
  } else if (kind === 'mine') {
    q.item = rng() < 0.6 ? 'ferrite' : 'cobalt';
    q.need = 4 + Math.floor(rng() * 5);
    q.title = 'Ore contract: ' + ITEMS[q.item].n;
    q.desc = 'Deliver ' + q.need + ' × ' + ITEMS[q.item].n + ' — blast asteroids to mine. Turn in from your log.';
    Object.assign(q, questReward(elvl, 1.15));
  } else if (kind === 'pirates') {
    q.need = 2 + Math.floor(rng() * 3);
    q.title = 'Bounty: raiders';
    q.desc = 'Destroy ' + q.need + ' pirate ships anywhere in the Reach.';
    Object.assign(q, questReward(elvl + 1, 1.3));
  } else if (kind === 'deliver') {
    const tgt = findDeliverTarget(rng, sector);
    if (!tgt) return null;
    q.target = tgt;
    q.tname = stationName(G.seed, tgt[0], tgt[1], tgt[2], 0);
    q.sname = sectorName(G.seed, tgt[0], tgt[1], tgt[2]);
    q.title = 'Courier run to ' + q.tname;
    q.desc = 'Deliver sealed cargo to ' + q.tname + ' — dock at any station in ' + q.sname + ' (sector ' + tgt.join(',') + ').';
    Object.assign(q, questReward(elvl + 1, 1.5));
  } else if (kind === 'explore') {
    const bi = BIOMES[Math.floor(rng() * BIOMES.length)];
    q.biome = bi.id;
    q.title = 'Survey a ' + bi.label.toLowerCase();
    q.desc = 'Land on any ' + bi.label.toLowerCase() + ' and report what grows there.';
    Object.assign(q, questReward(elvl, 0.9));
  }
  return q;
}
function npcQuestFor(qkey, biomeId, sector) {
  if (hash01(qkey, 'has') > 0.65) return null;
  const kinds = ['hunt', 'fetch', 'explore', 'deliver'];
  return makeQuest(qkey, kinds[Math.floor(hash01(qkey, 'kind') * kinds.length)], biomeId, sector);
}
function boardQuestsFor(stKey, sector) {
  const out = [];
  const kinds = ['pirates', 'mine', 'deliver'];
  for (let i = 0; i < 3; i++) {
    const q = makeQuest(hashInts(stKey, i + 11) | 0, kinds[i], 'forest', sector);
    if (q) out.push(q);
  }
  return out;
}
function questActive(id) { return (G.quests || []).some(q => q.id === id); }
function questDone(id) { return G.qdone && G.qdone[id]; }
function acceptQuest(q) {
  if (!G.quests) G.quests = [];
  if (G.quests.length >= MAX_QUESTS) { toast('Log is full — finish or drop a job first'); return false; }
  if (questActive(q.id) || questDone(q.id)) return false;
  G.quests.push(q);

  blip(820, 0.15, 0.07);

}
function completeQuest(q) {
  if (!G.qdone) G.qdone = {};
  G.qdone[q.id] = true;
  G.quests = G.quests.filter(x => x.id !== q.id);
  G.credits += q.cr;

}
function questReady(q) {

function roman(n) {
  const R = [[10,'X'],[9,'IX'],[5,'V'],[4,'IV'],[1,'I']];

  for (const [v, s] of R) while (n >= v) { out += s; n -= v; }

}

function enemyLevelAt(sx, sy, sz) {

const CREATURE_LOOKS = {
  stalker:  { body: 'cone', c: 0x3a4256, eye: 0xff4030, w: 1.4, h: 1.1 },
  skitter:  { body: 'flat', c: 0xb89a5e, eye: 0x30ff80, w: 1.5, h: 0.7 },

function buildCreature(kind, lvl) {
  const L = CREATURE_LOOKS[kind];
  const grp = new THREE.Group();
  const mat = new THREE.MeshStandardMaterial({ color: L.c, roughness: 0.8 });
  let body;
  if (L.body === 'cone') { body = new THREE.Mesh(new THREE.ConeGeometry(L.w, L.h * 2.2, 6), mat); body.rotation.x = Math.PI / 2; }
  else if (L.body === 'flat') { body = new THREE.Mesh(new THREE.SphereGeometry(L.w, 8, 6), mat); body.scale.y = 0.45; }
  else if (L.body === 'ico') body = new THREE.Mesh(new THREE.IcosahedronGeometry(L.w, 0), mat);
  else body = new THREE.Mesh(new THREE.SphereGeometry(L.w, 8, 8), mat);
  body.position.y = L.h;
  grp.add(body);
  const eyeMat = new THREE.MeshBasicMaterial({ color: L.eye });
  for (const s of [-0.32, 0.32]) {
    const eye = new THREE.Mesh(new THREE.SphereGeometry(0.14, 6, 6), eyeMat);
    eye.position.set(s, L.h + 0.25, -L.w * 0.8);
    grp.add(eye);
  }
  const scl = 1 + (lvl - 1) * 0.11;
  grp.scale.setScalar(scl);
  grp.userData = {
    kind, lvl, hp: 20 + lvl * 14, maxHp: 20 + lvl * 14,
    dmg: 4 + lvl * 2.5, speed: Math.min(14, 6.5 + lvl * 0.6),
    atkCd: 0, wanderT: 0, heading: Math.random() * 6.28,
    hover: L.hover || 0, bodyMat: mat, flashT: 0, isEnemy: true
  };
  return grp;
}

function floatText(pos3, txt, color) {
  const v = pos3.clone().project(camera);
  if (v.z > 1 || Math.abs(v.x) > 1 || Math.abs(v.y) > 1) return;
  const el = document.createElement('div');
  el.className = 'floatTxt';
  el.style.left = ((v.x * 0.5 + 0.5) * innerWidth) + 'px';
  el.style.top = ((-v.y * 0.5 + 0.5) * innerHeight) + 'px';
  el.style.color = color || '#ffe9b0';
  el.textContent = txt;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 900);
}
function explodeAt(pos, color, size) {
  const m = new THREE.Mesh(new THREE.SphereGeometry(size || 2, 8, 8),
    new THREE.MeshBasicMaterial({ color: color || 0xffa030, transparent: true, opacity: 0.9 }));
  m.position.copy(pos);
  scene.add(m);
  const t0 = performance.now();
  (function anim() {
    const t = (performance.now() - t0) / 400;
    if (t >= 1) { scene.remove(m); m.geometry.dispose(); return; }
    m.scale.setScalar(1 + t * 3);
    m.material.opacity = 0.9 * (1 - t);
    requestAnimationFrame(anim);
  })();
  boom();
}
function boom() {
  if (!AC) return;
  const len = 0.25, buf = AC.createBuffer(1, AC.sampleRate * len, AC.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length);
  const src = AC.createBufferSource(), g = AC.createGain(), f = AC.createBiquadFilter();
  f.type = 'lowpass'; f.frequency.value = 900;
  g.gain.setValueAtTime(0.14, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + len);
  src.buffer = buf; src.connect(f); f.connect(g); g.connect(masterGain);
  src.start();
}

      G.found[u.bossKey] = 1;
      addItem('relic', 1);
      const bcr = 100 + u.lvl * 30;
      G.credits += bcr;
      G.mainProg.broods = (G.mainProg.broods || 0) + 1;
      floatText(e.position, 'BROOD MOTHER SLAIN +' + bcr + ' ¤', '#e060ff');
      toast('The brood mother falls — a relic gleams in the rubble', 5000);
    }
    gainXP(xp);
    onKillCreature(u.kind);
    return true;
  }
  return false;
}

/* -------- firing -------- */
function tryFire(dt) {
  fireCd -= dt;
  if (!input.fire || fireCd > 0) return;
  fireCd = 0.25;
  blip(980, 0.08, 0.05);
  if (G.mode === 'space') {
    const cy = Math.cos(G.yaw), sy = Math.sin(G.yaw), cp = Math.cos(G.pitch), sp = Math.sin(G.pitch);
    const dir = new THREE.Vector3(-sy * cp, sp, -cy * cp);
    const m = new THREE.Mesh(new THREE.SphereGeometry(0.6, 6, 6), new THREE.MeshBasicMaterial({ color: 0x6cf6ff }));
    m.position.copy(ship.position).add(dir.clone().multiplyScalar(5));
    scene.add(m);
    spaceBolts.push({ m, vel: dir.multiplyScalar(620), friendly: true, dmg: playerDmg() * 1.4, t: 0 });
  } else {
    const sy = Math.sin(G.walk.yaw), cy = Math.cos(G.walk.yaw);
    const dir = new THREE.Vector3(-sy, 0, -cy);
    const py = G.inCave ? caveGroup.userData.floorY : terrainH(curPK, G.walk.x, G.walk.z, curBT);
    const m = new THREE.Mesh(new THREE.SphereGeometry(0.28, 6, 6), new THREE.MeshBasicMaterial({ color: 0x6cf6ff }));
    m.position.set(G.walk.x + dir.x * 1.2, py + 1.7, G.walk.z + dir.z * 1.2);
    scene.add(m);
    surfBolts.push({ m, vel: dir.multiplyScalar(70), dmg: playerDmg(), t: 0 });
  }
}
function clearBolts(list) {
  for (const b of list) { scene.remove(b.m); b.m.geometry.dispose(); }
  list.length = 0;
}

/* -------- surface combat tick -------- */
function activeSurfEnemies() {
  if (G.inCave) return caveEnemies;
  const out = [];
  for (const g of surfaceChunks.values())
    for (const e of g.userData.enemies || []) if (!e.userData.dead) out.push(e);
  return out;
}
function surfaceCombatTick(dt) {
  playerRegen(dt);
  tryFire(dt);
  const enemies = activeSurfEnemies();
  const py = G.inCave ? caveGroup.userData.floorY : terrainH(curPK, G.walk.x, G.walk.z, curBT);

  // bolts
  for (let i = surfBolts.length - 1; i >= 0; i--) {
    const b = surfBolts[i];
    b.t += dt;
    b.m.position.addScaledVector(b.vel, dt);
    let hit = b.t > 1.4;
    for (const e of enemies) {
      const ep = e.getWorldPosition(new THREE.Vector3());
      if (b.m.position.distanceTo(ep) < 2.2 * e.scale.x) {
        if (damageEnemy(e, b.dmg, ep)) removeEnemy(e);
        hit = true; break;
      }
    }
    if (hit) { scene.remove(b.m); b.m.geometry.dispose(); surfBolts.splice(i, 1); }
  }

  // enemy AI
  for (const e of enemies) {
    const u = e.userData;
    if (u.flashT > 0) { u.flashT -= dt; if (u.flashT <= 0) u.bodyMat.emissive = new THREE.Color(0x000000); }
    u.atkCd -= dt;
    const ex = e.position.x, ez = e.position.z;
    const dP = Math.hypot(ex - G.walk.x, ez - G.walk.z);
    let mx = 0, mz = 0;
    if (dP < 30 && dP > 2.2) {
      mx = (G.walk.x - ex) / dP; mz = (G.walk.z - ez) / dP;
      e.rotation.y = Math.atan2(-mx, -mz);
    } else if (dP <= 2.2) {
      if (u.atkCd <= 0) { u.atkCd = 1.1; applyPlayerDamage(u.dmg); floatText(e.position, 'BITE', '#ff5040'); }
    } else {
      u.wanderT -= dt;
      if (u.wanderT <= 0) { u.wanderT = 2 + Math.random() * 3; u.heading = Math.random() * 6.28; }
      mx = Math.sin(u.heading) * 0.4; mz = Math.cos(u.heading) * 0.4;
    }
    let nx = ex + mx * u.speed * dt, nz = ez + mz * u.speed * dt;
    if (G.inCave) {
      if (Math.hypot(nx, nz) < 26) { e.position.x = nx; e.position.z = nz; }
      e.position.y = py + (u.hover ? u.hover + Math.sin(G.playtime * 3) * 0.3 : 0);
    } else {
      const h = terrainH(curPK, nx, nz, curBT);
      const wl = curBT.water === null ? -1e9 : curBT.water;
      if (h > wl + 0.3 || u.hover) { e.position.x = nx; e.position.z = nz; e.position.y = Math.max(h, wl) + (u.hover ? u.hover + Math.sin(G.playtime * 3) * 0.3 : 0); }
      else u.heading += 2.5; // turn from water
    }
  }
}
function removeEnemy(e) {
  if (e.parent) e.parent.remove(e);
  const i = caveEnemies.indexOf(e);
  if (i >= 0) caveEnemies.splice(i, 1);
  for (const g of surfaceChunks.values()) {
    const arr = g.userData.enemies || [];
    const j = arr.indexOf(e);
    if (j >= 0) arr.splice(j, 1);
  }
}

/* -------- space combat -------- */
function spawnPirates(v, sx, sy, sz) {
  v.pirates = [];
  const d = Math.max(Math.abs(sx), Math.abs(sy), Math.abs(sz));
  const n = Math.floor(hash01(G.seed, 'pir', sx, sy, sz) * Math.min(3.6, 0.6 + d * 0.7));
  const elvl = enemyLevelAt(sx, sy, sz);
  const rng = cellRng(G.seed, 'pirgen', sx, sy, sz);
  // Dread Marauder: rare elite in deep space
  if (d >= 4 && hash01(G.seed, 'boss', sx, sy, sz) < 0.15) {
    const bid = sx + ',' + sy + ',' + sz + ':boss';
    if (!killedPirates.has(bid)) {
      const bp = buildShip();
      bp.scale.setScalar(2.6);
      bp.traverse(o => { if (o.material && o.material.color) { o.material = o.material.clone(); o.material.color.offsetHSL(0.7, 0.2, -0.15); } });
      const bm = new THREE.Mesh(new THREE.SphereGeometry(0.8, 8, 8), new THREE.MeshBasicMaterial({ color: 0xe060ff }));
      bm.position.y = 1.8; bp.add(bm);
      const ba = rng() * 6.28, br = 300 + rng() * 300;
      bp.position.set(v.star.pos.x + Math.cos(ba) * br, v.star.pos.y + (rng() - 0.5) * 150, v.star.pos.z + Math.sin(ba) * br);
      bp.userData = { id: bid, lvl: elvl + 2, hp: 120 + elvl * 45, maxHp: 120 + elvl * 45,
        dmg: 10 + elvl * 4, fireCd: 0.6, orbitA: ba, orbitR: br, dead: false, boss: true };
      v.group.add(bp);
      v.pirates.push(bp);
    }
  }
  for (let i = 0; i < n; i++) {
    const id = sx + ',' + sy + ',' + sz + ':' + i;
    if (killedPirates.has(id)) continue;
    const p = buildShip();
    p.scale.setScalar(1.3 + elvl * 0.06);
    p.traverse(o => { if (o.material && o.material.color) { o.material = o.material.clone(); o.material.color.offsetHSL(0, 0.15, -0.12); } });
    const marker = new THREE.Mesh(new THREE.SphereGeometry(0.6, 6, 6), new THREE.MeshBasicMaterial({ color: 0xff4030 }));
    marker.position.y = 1.6; p.add(marker);
    const a = rng() * 6.28, r = 250 + rng() * 500;
    p.position.set(v.star.pos.x + Math.cos(a) * r, v.star.pos.y + (rng() - 0.5) * 200, v.star.pos.z + Math.sin(a) * r);
    p.userData = { id, lvl: elvl, hp: 30 + elvl * 20, maxHp: 30 + elvl * 20,
      dmg: 6 + elvl * 3, fireCd: rng() * 1.5, orbitA: a, orbitR: r, dead: false };
    v.group.add(p);
    v.pirates.push(p);
  }
}
function spaceCombatTick(dt) {
  playerRegen(dt);
  tryFire(dt);
  const sp = ship.position;
  // pirate AI
  for (const v of loadedSystems.values()) {
    if (!v || !v.pirates) continue;
    for (const p of v.pirates) {
      const u = p.userData;
      if (u.dead) continue;
      const d = p.position.distanceTo(sp);
      if (d < 550) {
        const dir = sp.clone().sub(p.position).normalize();
        if (d > 90) p.position.addScaledVector(dir, (60 + u.lvl * 6) * dt);
        p.lookAt(sp);
        u.fireCd -= dt;
        if (u.fireCd <= 0 && d < 420) {
          u.fireCd = u.boss ? 0.9 : 1.5;
          const bm = new THREE.Mesh(new THREE.SphereGeometry(0.7, 6, 6), new THREE.MeshBasicMaterial({ color: 0xff7030 }));
          bm.position.copy(p.position);
          const spread = new THREE.Vector3((Math.random()-0.5)*14, (Math.random()-0.5)*14, (Math.random()-0.5)*14);
          const vel = sp.clone().add(spread).sub(p.position).normalize().multiplyScalar(300);
          scene.add(bm);
          spaceBolts.push({ m: bm, vel, friendly: false, dmg: u.dmg, t: 0 });
        }
      } else {
        u.orbitA += dt * 0.05;
        p.position.x = v.star.pos.x + Math.cos(u.orbitA) * u.orbitR;
        p.position.z = v.star.pos.z + Math.sin(u.orbitA) * u.orbitR;
      }
    }
  }
  // bolts
  for (let i = spaceBolts.length - 1; i >= 0; i--) {
    const b = spaceBolts[i];
    b.t += dt;
    b.m.position.addScaledVector(b.vel, dt);
    let done = b.t > 2.2;
    if (b.friendly) {
      outer:
      for (const v of loadedSystems.values()) {
        if (!v) continue;
        for (const r of v.asteroids || []) {
          if (!r.mesh) continue;
          if (b.m.position.distanceTo(r.pos) < r.size + 2) {
            r.mesh.userData.hp -= b.dmg;
            floatText(r.pos, '-' + Math.round(b.dmg), '#c8ccd8');
            blip(220, 0.06, 0.05);
            if (r.mesh.userData.hp <= 0) {
              minedRocks.add(r.id);
              v.group.remove(r.mesh);
              r.mesh.geometry.dispose();
              r.mesh = null;
              const n = 1 + Math.floor(Math.random() * 3);
              addItem(r.ore, n);
              explodeAt(r.pos, 0x9aa4b8, r.size * 0.6);
              floatText(r.pos, '+ ' + n + ' ' + ITEMS[r.ore].n, ITEMS[r.ore].c);
              gainXP(6);
            }
            done = true; break outer;
          }
        }
        if (!v.pirates) continue;
        for (const p of v.pirates) {
          if (p.userData.dead) continue;
          if (b.m.position.distanceTo(p.position) < 9 * p.scale.x) {
            p.userData.hp -= b.dmg;
            floatText(p.position, '-' + Math.round(b.dmg), '#ff8a70');
            if (p.userData.hp <= 0) {
              p.userData.dead = true;
              killedPirates.add(p.userData.id);
              const isBoss = p.userData.boss;
              const cr = isBoss ? 150 + p.userData.lvl * 40 : 25 + p.userData.lvl * 14;
              const xp = isBoss ? 120 + p.userData.lvl * 40 : 30 + p.userData.lvl * 16;
              if (isBoss) {
                addItem('core', 1);
                G.mainProg.marauders = (G.mainProg.marauders || 0) + 1;
                floatText(p.position, 'DREAD MARAUDER DOWN', '#e060ff');
                toast('Dread Marauder destroyed — Marauder Core recovered', 5000);
              }
              G.credits += cr;
              explodeAt(p.position, 0xffa030, 5);
              floatText(p.position, '+' + cr + ' ¤  +' + xp + ' XP', '#ffe9b0');
              dropPirateLoot(p.userData.lvl, p.position);
              gainXP(xp);
              onKillPirate();
              v.group.remove(p);
            } else blip(300, 0.08, 0.05);
            done = true; break outer;
          }
        }
      }
    } else if (b.m.position.distanceTo(sp) < 8) {
      applyPlayerDamage(b.dmg);
      done = true;
    }
    if (done) { scene.remove(b.m); b.m.geometry.dispose(); spaceBolts.splice(i, 1); }
  }
  // death in space
  if (G.hp <= 0) {
    const loss = Math.floor(G.credits * 0.1);
    G.credits -= loss;
    G.hp = Math.floor(G.hpMax * 0.5); G.shield = G.shieldMax;
    G.pos.x += 600; G.pos.y += 300; G.vel = { x: 0, y: 0, z: 0 };
    clearBolts(spaceBolts);
    toast('Hull breach — emergency warp. Lost ' + loss + ' ¤');
    SaveMan.save(snapshot(), true);
  }
}


/* ---------------- SURFACE MAP / MINIMAP ---------------- */
function chunkFeatureProbe(cx, cz) {
  const out = {};
  const wl = curBT.water === null ? -1e9 : curBT.water;
  if (hash01(curPK, 'vil', cx, cz) < 0.07) {
    const vcx = cx * CHUNK, vcz = cz * CHUNK;
    const h0 = terrainH(curPK, vcx, vcz, curBT);
    const slope = Math.abs(terrainH(curPK, vcx + 14, vcz, curBT) - h0) + Math.abs(terrainH(curPK, vcx, vcz + 14, curBT) - h0);
    if (h0 > wl + 1 && slope < 5) out.village = { x: vcx, z: vcz };
  } else if (hash01(curPK, 'cave', cx, cz) < 0.09) {
    const rngC = cellRng(curPK, 'cgen', cx, cz);
    const ex = cx * CHUNK + (rngC() - 0.5) * CHUNK * 0.6, ez = cz * CHUNK + (rngC() - 0.5) * CHUNK * 0.6;
    if (terrainH(curPK, ex, ez, curBT) > wl + 0.5) out.cave = { x: ex, z: ez };
  } else if (hash01(curPK, 'ruin', cx, cz) < 0.035) {
    const rRng = cellRng(curPK, 'rgen', cx, cz);
    const rx = cx * CHUNK + (rRng() - 0.5) * CHUNK * 0.5, rz = cz * CHUNK + (rRng() - 0.5) * CHUNK * 0.5;
    if (terrainH(curPK, rx, rz, curBT) > wl + 0.5) out.ruin = { x: rx, z: rz };
  }
  return out;
}
function hex6(n) { return '#' + n.toString(16).padStart(6, '0'); }
function mapTerrainColor(h) {
  const wl = curBT.water === null ? -1e9 : curBT.water;
  if (h < wl) return hex6(curBT.acid ? 0x6e8f1a : (curBT.ice ? 0xbfe4f5 : 0x1e4a9e));
  if (h < wl + 0.8) return hex6(curBT.shore);
  if (h > curBT.amp * 0.55) return hex6(curBT.high);
  return hex6(curPlanet.biome.ground);
}
function clampToEdge(sx, sy, W) {
  const m = 8;
  return [Math.max(m, Math.min(W - m, sx)), Math.max(m, Math.min(W - m, sy)), (sx < m || sx > W - m || sy < m || sy > W - m)];
}
function drawSurfaceMap(canvas, range, detail, withLabels) {
  if (!curPlanet) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width;
  const px = G.walk.x, pz = G.walk.z;
  const scale = W / (2 * range);
  // terrain
  const cellW = W / detail;
  for (let i = 0; i < detail; i++) for (let j = 0; j < detail; j++) {
    const wx = px - range + (i + 0.5) * (2 * range / detail);
    const wz = pz - range + (j + 0.5) * (2 * range / detail);
    ctx.fillStyle = mapTerrainColor(terrainH(curPK, wx, wz, curBT));
    ctx.fillRect(i * cellW, j * cellW, cellW + 1, cellW + 1);
  }
  const toS = (wx, wz) => [(wx - px) * scale + W / 2, (wz - pz) * scale + W / 2];
  // features from the hash grid across the visible range
  const c0x = Math.floor((px - range) / CHUNK), c1x = Math.ceil((px + range) / CHUNK);
  const c0z = Math.floor((pz - range) / CHUNK), c1z = Math.ceil((pz + range) / CHUNK);
  for (let cx = c0x; cx <= c1x; cx++) for (let cz = c0z; cz <= c1z; cz++) {
    const f = chunkFeatureProbe(cx, cz);
    if (f.village) {
      const [sx, sy] = toS(f.village.x, f.village.z);
      ctx.fillStyle = '#f5a623';
      ctx.fillRect(sx - 4, sy - 4, 8, 8);
      if (withLabels) { ctx.fillStyle = '#ffe9b0'; ctx.font = '9px sans-serif'; ctx.textAlign = 'center'; ctx.fillText('village', sx, sy + 14); }
    }
    if (f.cave) {
      const [sx, sy] = toS(f.cave.x, f.cave.z);
      ctx.strokeStyle = '#6cc6ff'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(sx, sy, 4, 0, 7); ctx.stroke();
    }
    if (f.ruin) {
      const [sx, sy] = toS(f.ruin.x, f.ruin.z);
      ctx.fillStyle = '#e060ff';
      ctx.save(); ctx.translate(sx, sy); ctx.rotate(Math.PI / 4);
      ctx.fillRect(-3.5, -3.5, 7, 7);
      ctx.restore();
    }
  }
  // live enemies (loaded chunks only)
  ctx.fillStyle = '#ff5040';
  for (const g of surfaceChunks.values())
    for (const e of g.userData.enemies || []) {
      if (e.userData.dead) continue;
      const [sx, sy] = toS(e.position.x, e.position.z);
      if (sx >= 0 && sx <= W && sy >= 0 && sy <= W) { ctx.beginPath(); ctx.arc(sx, sy, 2.5, 0, 7); ctx.fill(); }
    }
  // the ship — clamped to the edge with a hollow marker when out of range
  if (landedShip) {
    let [sx, sy] = toS(landedShip.position.x, landedShip.position.z);
    const [cx2, cy2, clamped] = clampToEdge(sx, sy, W);
    ctx.strokeStyle = '#ffe9b0'; ctx.fillStyle = '#f5c623'; ctx.lineWidth = 2;
    ctx.save(); ctx.translate(cx2, cy2);
    ctx.beginPath(); ctx.moveTo(0, -6); ctx.lineTo(5, 5); ctx.lineTo(-5, 5); ctx.closePath();
    if (clamped) ctx.stroke(); else { ctx.fill(); }
    ctx.restore();
    if (withLabels) { ctx.fillStyle = '#ffe9b0'; ctx.font = '9px sans-serif'; ctx.textAlign = 'center'; ctx.fillText('SHIP', cx2, cy2 + 15); }
  }
  // player arrow, heading-aware, always center
  ctx.save();
  ctx.translate(W / 2, W / 2);
  ctx.rotate(-G.walk.yaw);
  ctx.fillStyle = '#ffffff';
  ctx.strokeStyle = 'rgba(0,0,0,0.6)'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(0, -7); ctx.lineTo(5, 6); ctx.lineTo(-5, 6); ctx.closePath();
  ctx.fill(); ctx.stroke();
  ctx.restore();
}
let miniT = 9;
function tickMiniMap(dt) {
  miniT += dt;
  if (miniT < 0.5) return;
  miniT = 0;
  drawSurfaceMap($('miniMap'), 130, 36, false);
}

const input = { fwd: 0, strafe: 0, up: 0, boost: false, lookX: 0, lookY: 0 };
const keys = {};
addEventListener('keydown', e => { keys[e.code] = true; if (e.code === 'Space') { input.fire = true; e.preventDefault(); } });
